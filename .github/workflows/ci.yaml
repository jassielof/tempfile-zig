name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build and Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      - name: Check formatting
        run: zig fmt .

      - name: Build
        run: zig build --summary all

      - name: Generate documentation
        run: zig build docs --summary all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: zig-out/docs

  tests:
    name: Testing
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Zig
        uses: jassielof/setup-zig@v1
      - name: Run test suite
        run: zig build testing --summary all

  pages:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
